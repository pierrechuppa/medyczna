<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedScrubs - Sklep i Kursy</title>
  <style>
    :root {
      --primary: #0d6efd;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 15px;
    }
    .section {
      margin-bottom: 50px;
    }
    h2 {
      color: var(--primary);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .card-body {
      padding: 15px;
    }
    .price {
      font-size: 1.3em;
      font-weight: bold;
      color: #28a745;
    }
    button {
      padding: 10px 15px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #0b5ed7;
    }
    .admin-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #dc3545;
      padding: 15px 20px;
      border-radius: 50px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 200;
    }
    .modal-content {
      background: white;
      margin: 5% auto;
      padding: 25px;
      width: 90%;
      max-width: 600px;
      border-radius: 10px;
    }
    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    #cart-count {
      background: red;
      color: white;
      border-radius: 50%;
      padding: 2px 8px;
      font-size: 0.8em;
      vertical-align: top;
    }
  </style>
</head>
<body>

<header>
  <h1>MedScrubs Store</h1>
  <nav>
    <a href="#shop">Sklep</a>
    <a href="#courses">Kursy</a>
    <a href="#" onclick="showCart()">Koszyk (<span id="cart-count">0</span>)</a>
  </nav>
</header>

<div class="container">

  <!-- SEKcja SKLEP -->
  <div id="shop" class="section">
    <h2>Medyczne Scrubsy</h2>
    <div id="products-grid" class="grid"></div>
  </div>

  <!-- SEKcja KURSY -->
  <div id="courses" class="section">
    <h2>Kursy i Szkolenia</h2>
    <div id="courses-grid" class="grid"></div>
  </div>

</div>

<!-- Przycisk Admin -->
<button class="admin-btn" onclick="showAdmin()">Panel Administratora</button>

<!-- Modal Admin -->
<div id="admin-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>Panel Administratora</h2>
    
    <h3>Dodaj nowy Scrubs</h3>
    <input type="text" id="prod-name" placeholder="Nazwa (np. Scrubs Niebieskie)">
    <input type="number" id="prod-price" placeholder="Cena (zł)" step="0.01">
    <input type="text" id="prod-img" placeholder="Link do zdjęcia (URL)">
    <textarea id="prod-desc" placeholder="Opis" rows="3"></textarea>
    <button onclick="addProduct()">Dodaj Scrubs do sklepu</button>

    <hr>

    <h3>Dodaj nowy Kurs</h3>
    <input type="text" id="course-name" placeholder="Nazwa kursu">
    <input type="number" id="course-price" placeholder="Cena (zł)" step="0.01">
    <input type="text" id="course-duration" placeholder="Czas trwania (np. 4 godziny)">
    <textarea id="course-desc" placeholder="Opis kursu" rows="3"></textarea>
    <button onclick="addCourse()">Dodaj Kurs</button>
  </div>
</div>

<!-- Modal Koszyka -->
<div id="cart-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCartModal()">&times;</span>
    <h2>Twój Koszyk</h2>
    <div id="cart-items"></div>
    <h3 id="cart-total">Razem: 0 zł</h3>
    <button onclick="clearCart()">Wyczyść koszyk</button>
    <button onclick="closeCartModal()" style="background:#6c757d;">Zamknij</button>
  </div>
</div>

<script>
// Dane (zapisują się w localStorage)
let products = JSON.parse(localStorage.getItem('products')) || [
  {
    id: 1,
    name: "Scrubs Klasyczne Niebieskie",
    price: 129.99,
    img: "https://via.placeholder.com/300x220/0d6efd/white?text=Scrubs+Niebieskie",
    desc: "Wysokiej jakości scrubsy medyczne, oddychające, antybakteryjne."
  },
  {
    id: 2,
    name: "Scrubs Zielone Premium",
    price: 159.50,
    img: "https://via.placeholder.com/300x220/198754/white?text=Scrubs+Zielone",
    desc: "Scrubsy z kieszeniami i regulacją w pasie."
  }
];

let courses = JSON.parse(localStorage.getItem('courses')) || [
  {
    id: 1,
    name: "Higiena i noszenie scrubsów",
    price: 89.00,
    duration: "2 godziny",
    desc: "Kurs online o prawidłowym użytkowaniu odzieży medycznej."
  }
];

let cart = [];

// Render produktów
function renderProducts() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${p.img}" alt="${p.name}">
      <div class="card-body">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="price">${p.price.toFixed(2)} zł</div>
        <button onclick="addToCart('product', ${p.id})">Dodaj do koszyka</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Render kursów
function renderCourses() {
  const grid = document.getElementById('courses-grid');
  grid.innerHTML = '';
  courses.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-body">
        <h3>${c.name}</h3>
        <p>${c.desc}</p>
        <p><strong>Czas:</strong> ${c.duration}</p>
        <div class="price">${c.price.toFixed(2)} zł</div>
        <button onclick="addToCart('course', ${c.id})">Kup kurs</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Dodawanie produktu
function addProduct() {
  const name = document.getElementById('prod-name').value;
  const price = parseFloat(document.getElementById('prod-price').value);
  const img = document.getElementById('prod-img').value || 'https://via.placeholder.com/300x220/0d6efd/white?text=Nowy+Scrubs';
  const desc = document.getElementById('prod-desc').value;

  if (!name || !price) {
    alert("Podaj przynajmniej nazwę i cenę!");
    return;
  }

  products.push({
    id: Date.now(),
    name,
    price,
    img,
    desc: desc || "Brak opisu"
  });

  localStorage.setItem('products', JSON.stringify(products));
  renderProducts();
  alert("Scrubs dodany!");
}

// Dodawanie kursu
function addCourse() {
  const name = document.getElementById('course-name').value;
  const price = parseFloat(document.getElementById('course-price').value);
  const duration = document.getElementById('course-duration').value;
  const desc = document.getElementById('course-desc').value;

  if (!name || !price) {
    alert("Podaj nazwę i cenę kursu!");
    return;
  }

  courses.push({
    id: Date.now(),
    name,
    price,
    duration: duration || "Brak informacji",
    desc: desc || "Brak opisu"
  });

  localStorage.setItem('courses', JSON.stringify(courses));
  renderCourses();
  alert("Kurs dodany!");
}

// Koszyk
function addToCart(type, id) {
  let item;
  if (type === 'product') {
    item = products.find(p => p.id === id);
  } else {
    item = courses.find(c => c.id === id);
  }

  if (item) {
    cart.push({...item, type});
    updateCartCount();
    alert(`${item.name} dodano do koszyka!`);
  }
}

function updateCartCount() {
  document.getElementById('cart-count').textContent = cart.length;
}

function showCart() {
  const modal = document.getElementById('cart-modal');
  const itemsDiv = document.getElementById('cart-items');
  itemsDiv.innerHTML = '';

  let total = 0;

  cart.forEach((item, index) => {
    const div = document.createElement('div');
    div.style.marginBottom = '15px';
    div.innerHTML = `
      <strong>${item.name}</strong> - ${item.price.toFixed(2)} zł 
      <small>(${item.type === 'product' ? 'Scrubs' : 'Kurs'})</small>
      <button onclick="removeFromCart(${index})" style="float:right; background:red;">Usuń</button>
    `;
    itemsDiv.appendChild(div);
    total += item.price;
  });

  document.getElementById('cart-total').textContent = `Razem: ${total.toFixed(2)} zł`;
  modal.style.display = 'block';
}

function removeFromCart(index) {
  cart.splice(index, 1);
  showCart();
  updateCartCount();
}

function clearCart() {
  if (confirm("Na pewno wyczyścić cały koszyk?")) {
    cart = [];
    updateCartCount();
    showCart();
  }
}

function closeCartModal() {
  document.getElementById('cart-modal').style.display = 'none';
}

// Modal admin
function showAdmin() {
  document.getElementById('admin-modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('admin-modal').style.display = 'none';
}

// Inicjalizacja
renderProducts();
renderCourses();
updateCartCount();

// Zamykanie modalu kliknięciem poza nim
window.onclick = function(event) {
  const adminM = document.getElementById('admin-modal');
  const cartM = document.getElementById('cart-modal');
  if (event.target === adminM) adminM.style.display = 'none';
  if (event.target === cartM) cartM.style.display = 'none';
}
</script>

</body>
</html>
